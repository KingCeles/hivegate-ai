services:
  - type: web
    name: hivegate-main-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hivegate-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ID_MODEL
        value: id_model.pt
      - key: COUNT_MODEL
        value: bee_motion.pt
      - key: YOLO_DEVICE
        value: cpu
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: groq/compound-mini
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: hivegate-motion-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app2:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: COUNT_MODEL
        value: bee_motion_reviewed.pt
      - key: YOLO_DEVICE
        value: cpu

databases:
  - name: hivegate-db
    plan: free
